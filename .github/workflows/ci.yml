name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:                      
      PYTHONPATH: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Raw Data from Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: python src/ingest_data.py

      - name: Process and Clean Data
        run: python src/clean_data.py

      - name: Validate Data
        run: python src/validate_data.py
        
      - name: Feature Engineering
        run: python src/feature_engineering.py
        
      - name: Split Data
        run: python src/split_data.py

      - name: Train and Evaluate ML Model
        run: python src/train_model.py

      - name: Run Pytest
        run: |
          pytest -v

      - name: Save ML Assets as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-ml-assets
          path: models/

      # --- CONTINUOUS DEPLOYMENT (DOCKER & K8S) ---
      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/churn-api:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-api:latest

      - name: Simulated Deployment (Local Cluster)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Simulating K8s deployment for development environment..."
          echo "In a production cloud environment, we would run: kubectl apply -f k8s/ && kubectl rollout restart deployment <deployment-name>"
          echo "Kubernetes configs present in repository:"
          ls k8s/