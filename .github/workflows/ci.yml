name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:                      
      PYTHONPATH: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Raw Data from Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: python src/ingest_data.py

      - name: Process and Clean Data
        run: python src/clean_data.py

      - name: Validate Data
        run: python src/validate_data.py
        
      - name: Feature Engineering
        run: python src/feature_engineering.py
        
      - name: Split Data
        run: python src/split_data.py

      - name: Train and Evaluate ML Model
        run: python src/train_model.py

      - name: Run Pytest
        run: |
          pytest -v

      - name: Save Model as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-churn-model
          path: models/model.pkl